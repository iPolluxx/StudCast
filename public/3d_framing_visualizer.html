<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-950 text-slate-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lone Ranger AI Estimator</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Three.js CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        /* Hide scrollbars for a cleaner look */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
        
        .glass-panel {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .pulse-ring {
            animation: pulse-ring 1.5s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.5; }
            80% { transform: scale(1.5); opacity: 0; }
            100% { transform: scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body class="h-full w-full overflow-hidden font-sans relative text-slate-200">

    <!-- FULL SCREEN 3D CANVAS -->
    <div id="canvas-mount" class="absolute inset-0 z-0"></div>

    <!-- TOP HEADER (Minimalist) -->
    <header class="absolute top-0 left-0 w-full z-10 p-6 flex justify-between items-start pointer-events-none">
        <div class="flex items-center gap-3">
            <div class="p-2.5 bg-amber-500 rounded-xl text-slate-950 shadow-[0_0_20px_rgba(245,158,11,0.3)] pointer-events-auto">
                <i data-lucide="zap" class="w-6 h-6"></i>
            </div>
            <div>
                <h1 class="text-2xl font-black tracking-tighter text-white drop-shadow-md">
                    LONE RANGER
                </h1>
                <p class="text-xs font-semibold tracking-widest text-amber-500 uppercase drop-shadow-md">AI Estimating Engine</p>
            </div>
        </div>

        <button onclick="toggleSettings()" class="pointer-events-auto p-3 rounded-full glass-panel hover:bg-slate-800 transition-all text-slate-300 hover:text-white">
            <i data-lucide="settings" class="w-5 h-5"></i>
        </button>
    </header>

    <!-- FLOATING RIGHT PANEL: LIVE RECEIPT & DATA -->
    <div class="absolute top-24 right-6 bottom-32 w-96 glass-panel rounded-2xl flex flex-col z-10 shadow-2xl pointer-events-auto transform transition-transform duration-300" id="receipt-panel">
        
        <div class="px-6 py-5 border-b border-white/5 flex justify-between items-center">
            <h2 class="text-sm font-bold tracking-widest uppercase text-slate-300 flex items-center gap-2">
                <i data-lucide="list-checks" class="w-4 h-4 text-emerald-400"></i> Materials & Labor
            </h2>
            <div class="text-[10px] text-amber-500 border border-amber-500/30 bg-amber-500/10 px-2 py-1 rounded-full font-bold">
                10% WASTE INCLUDED
            </div>
        </div>

        <div class="flex-1 overflow-y-auto px-6 py-4 space-y-4">
            <!-- Active Parameters Readout -->
            <div class="grid grid-cols-2 gap-2 text-xs mb-4 pb-4 border-b border-white/5" id="active-params">
                <div class="text-slate-400">Length: <span class="text-white font-bold" id="readout-l">16 ft</span></div>
                <div class="text-slate-400">Height: <span class="text-white font-bold" id="readout-h">8 ft</span></div>
                <div class="text-slate-400">Openings: <span class="text-white font-bold" id="readout-o">0</span></div>
                <div class="text-slate-400">Plate: <span class="text-amber-400 font-bold" id="readout-t">Standard</span></div>
            </div>

            <!-- Dynamic Invoice Items -->
            <div id="invoice-items" class="space-y-3">
                <!-- Javascript will populate this -->
            </div>
        </div>

        <div class="bg-black/40 p-6 rounded-b-2xl border-t border-white/5 shrink-0">
            <div class="flex justify-between items-end mb-4">
                <div>
                    <span class="text-[10px] uppercase tracking-widest text-slate-400 font-bold block mb-1">Estimated Total</span>
                    <span class="text-3xl font-black text-emerald-400" id="sum-grandtotal">$0.00</span>
                </div>
            </div>
            <button onclick="approveEstimate()" class="w-full bg-white text-slate-950 font-bold py-3.5 rounded-xl shadow-[0_0_20px_rgba(255,255,255,0.2)] hover:scale-[1.02] transition-transform flex justify-center items-center gap-2">
                <i data-lucide="check-circle" class="w-5 h-5"></i>
                LOCK IN ESTIMATE
            </button>
        </div>
    </div>

    <!-- AI COMMAND BAR (BOTTOM CENTER) -->
    <div class="absolute bottom-8 left-1/2 -translate-x-1/2 w-full max-w-2xl z-20 px-4 pointer-events-auto">
        <div class="glass-panel rounded-full p-2 pl-6 flex items-center gap-4 shadow-2xl relative">
            
            <i data-lucide="sparkles" class="w-5 h-5 text-amber-500"></i>
            
            <input type="text" id="ai-input" placeholder="e.g. 'Frame a 24 foot wall, 10 feet high with one door'" 
                   class="flex-1 bg-transparent border-none text-white focus:outline-none placeholder-slate-500 text-sm font-medium"
                   onkeypress="handleEnter(event)">
            
            <!-- Voice Dictation Button -->
            <button id="mic-btn" onclick="toggleVoice()" class="relative bg-amber-500 hover:bg-amber-400 text-slate-950 p-4 rounded-full transition-colors z-10 flex items-center justify-center">
                <i data-lucide="mic" class="w-5 h-5"></i>
                <div id="mic-pulse" class="absolute inset-0 border-2 border-amber-500 rounded-full hidden"></div>
            </button>

        </div>
        <p class="text-center text-[10px] text-slate-500 mt-3 font-semibold tracking-wider uppercase" id="ai-status">
            Type or click the microphone to describe the project
        </p>
    </div>

    <!-- HIDDEN SETTINGS MODAL (For pricing adjustments) -->
    <div id="settings-modal" class="fixed inset-0 z-50 bg-slate-950/80 backdrop-blur-md hidden items-center justify-center p-4">
        <div class="bg-slate-900 border border-slate-800 w-full max-w-md rounded-2xl shadow-2xl overflow-hidden flex flex-col max-h-[80vh]">
            <div class="p-6 border-b border-slate-800 flex justify-between items-center bg-slate-950">
                <h3 class="font-bold text-white flex items-center gap-2">
                    <i data-lucide="sliders" class="w-4 h-4 text-amber-500"></i> Baseline Rates
                </h3>
                <button onclick="toggleSettings()" class="text-slate-400 hover:text-white"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            
            <div class="p-6 overflow-y-auto space-y-4">
                <div class="space-y-3">
                    <div class="flex justify-between items-center text-sm"><label class="text-slate-400">2x4 Stud (ea)</label><input type="number" id="p-stud" value="6.25" step="0.01" class="w-20 bg-slate-950 border border-slate-800 rounded px-2 text-right text-amber-400" onchange="runEngine()"></div>
                    <div class="flex justify-between items-center text-sm"><label class="text-slate-400">Treated Plate (ea)</label><input type="number" id="p-treated" value="16.50" step="0.01" class="w-20 bg-slate-950 border border-slate-800 rounded px-2 text-right text-amber-400" onchange="runEngine()"></div>
                    <div class="flex justify-between items-center text-sm"><label class="text-slate-400">1/2" Drywall (ea)</label><input type="number" id="p-drywall" value="15.50" step="0.01" class="w-20 bg-slate-950 border border-slate-800 rounded px-2 text-right text-amber-400" onchange="runEngine()"></div>
                    <div class="flex justify-between items-center text-sm"><label class="text-slate-400">Labor Rate (/hr)</label><input type="number" id="p-labor" value="55.00" step="0.01" class="w-20 bg-slate-950 border border-slate-800 rounded px-2 text-right text-amber-400" onchange="runEngine()"></div>
                    <div class="flex justify-between items-center text-sm"><label class="text-slate-400">Profit Markup (%)</label><input type="number" id="p-markup" value="20" step="1" class="w-20 bg-slate-950 border border-slate-800 rounded px-2 text-right text-amber-400" onchange="runEngine()"></div>
                </div>
            </div>
            <div class="p-4 bg-slate-950 border-t border-slate-800">
                <button onclick="toggleSettings()" class="w-full bg-slate-800 hover:bg-slate-700 text-white font-bold py-2 rounded-lg">Done</button>
            </div>
        </div>
    </div>


    <!-- ENGINEERING SCRIPT -->
    <script>
        // State Application Variables
        let state = {
            length: 16,
            height: 8,
            openings: 0,
            treated: false,
            drywall: true,
            spacing: 16
        };

        // Three.js Core
        let scene, camera, renderer, controls;
        let woodMaterials = {};
        const wallGroup = new THREE.Group();

        window.onload = function() {
            lucide.createIcons();
            init3D();
            runEngine();
            window.addEventListener('resize', handleResize);
        }

        // ==========================================
        // 1. NLP & VOICE SIMULATION ENGINE
        // ==========================================
        let recognition;
        let isListening = false;
        
        // Initialize Web Speech API (Works natively in Chrome)
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRec();
            recognition.continuous = false;
            recognition.interimResults = false;
            
            recognition.onstart = function() {
                isListening = true;
                document.getElementById('mic-pulse').classList.add('pulse-ring');
                document.getElementById('mic-pulse').classList.remove('hidden');
                document.getElementById('ai-status').innerText = "Listening...";
                document.getElementById('ai-status').className = "text-center text-[10px] text-amber-500 mt-3 font-bold tracking-wider uppercase animate-pulse";
            };

            recognition.onresult = function(event) {
                const transcript = event.results[0][0].transcript;
                document.getElementById('ai-input').value = transcript;
                processNaturalLanguage(transcript);
            };

            recognition.onerror = function(event) {
                console.error("Speech recognition error", event.error);
                resetVoiceUI();
            };

            recognition.onend = function() {
                resetVoiceUI();
            };
        } else {
            console.warn("Speech Recognition API not supported in this browser.");
            document.getElementById('mic-btn').onclick = () => alert("Voice dictation requires Google Chrome or Safari.");
        }

        function toggleVoice() {
            if (!recognition) return;
            if (isListening) {
                recognition.stop();
            } else {
                recognition.start();
            }
        }

        function resetVoiceUI() {
            isListening = false;
            document.getElementById('mic-pulse').classList.remove('pulse-ring');
            document.getElementById('mic-pulse').classList.add('hidden');
            document.getElementById('ai-status').innerText = "Type or click the microphone to describe the project";
            document.getElementById('ai-status').className = "text-center text-[10px] text-slate-500 mt-3 font-semibold tracking-wider uppercase";
        }

        function handleEnter(e) {
            if (e.key === 'Enter') {
                processNaturalLanguage(document.getElementById('ai-input').value);
            }
        }

        // The "Brain" that extracts math from natural sentences
        function processNaturalLanguage(text) {
            let t = text.toLowerCase();
            
            // Extract numbers using basic regex mapping
            const nums = t.match(/\d+/g);
            
            // Very rudimentary number word conversion for common sizes
            const wordsToNumbers = {'ten':10, 'twelve':12, 'fourteen':14, 'sixteen':16, 'twenty':20, 'one':1, 'two':2};
            Object.keys(wordsToNumbers).forEach(word => {
                if (t.includes(word)) { t = t.replace(new RegExp(word, 'g'), wordsToNumbers[word]); }
            });

            // Re-run regex after word replacement
            const finalNums = t.match(/\d+/g);

            // Update Logic based on presence
            if (finalNums && finalNums.length >= 1) {
                state.length = parseInt(finalNums[0]);
                // If they say "20 foot by 10 foot", the second number is height
                if (finalNums.length >= 2) { state.height = parseInt(finalNums[1]); }
                // Cap limits to prevent insane rendering crash
                if (state.length > 50) state.length = 50;
                if (state.height > 20) state.height = 20;
            }

            // Keyword triggers
            state.openings = 0;
            if (t.includes('door') || t.includes('window') || t.includes('opening')) state.openings = 1;
            if (t.includes('two doors') || t.includes('2 doors') || t.includes('two windows')) state.openings = 2;
            
            state.treated = t.includes('treated') || t.includes('green') || t.includes('concrete');

            // Give UI feedback
            document.getElementById('ai-input').value = "";
            document.getElementById('ai-input').placeholder = `Rendered: ${state.length}ft wall, ${state.height}ft high.`;

            // Run Engine
            runEngine();
        }

        function toggleSettings() {
            const modal = document.getElementById('settings-modal');
            modal.classList.toggle('hidden');
            modal.classList.toggle('flex');
        }

        // ==========================================
        // 2. THREE.JS INITIALIZATION
        // ==========================================
        function init3D() {
            const container = document.getElementById('canvas-mount');
            scene = new THREE.Scene();
            
            // Ambient environment matching UI dark mode
            scene.fog = new THREE.FogExp2(0x0f172a, 0.015);
            
            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(-10, 12, 25); // Cinematic starting angle

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            container.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.maxPolarAngle = Math.PI / 2 - 0.05; 
            controls.target.set(8, 4, 0); // Focus point

            // Lighting setup for realism
            const ambient = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambient);

            const dirLight = new THREE.DirectionalLight(0xffedd5, 1.2);
            dirLight.position.set(20, 30, 20);
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.width = 2048;
            dirLight.shadow.mapSize.height = 2048;
            scene.add(dirLight);

            // Studio floor
            const floorGeo = new THREE.PlaneGeometry(200, 200);
            const floorMat = new THREE.MeshStandardMaterial({ 
                color: 0x0f172a, 
                roughness: 0.9,
                metalness: 0.0
            });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            floor.receiveShadow = true;
            scene.add(floor);

            // Blueprint Grid overlay
            const grid = new THREE.GridHelper(100, 100, 0x334155, 0x1e293b);
            grid.position.y = 0.02;
            scene.add(grid);

            woodMaterials = {
                stud: new THREE.MeshStandardMaterial({ color: 0xd4a373, roughness: 0.8 }),
                treated: new THREE.MeshStandardMaterial({ color: 0x606c38, roughness: 0.9 }),
                drywall: new THREE.MeshStandardMaterial({ color: 0xe2e8f0, transparent: true, opacity: 0.2, depthWrite: false })
            };

            scene.add(wallGroup);
            animate();
        }

        function handleResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (controls) controls.update();
            if (renderer) renderer.render(scene, camera);
        }

        // ==========================================
        // 3. MASTER CONTROLLER (Math & Render Logic)
        // ==========================================
        function runEngine() {
            if (!scene) return;

            // Update UI readouts
            document.getElementById('readout-l').innerText = `${state.length} ft`;
            document.getElementById('readout-h').innerText = `${state.height} ft`;
            document.getElementById('readout-o').innerText = state.openings;
            document.getElementById('readout-t').innerText = state.treated ? "Treated" : "Standard";
            document.getElementById('readout-t').className = state.treated ? "text-emerald-400 font-bold" : "text-amber-400 font-bold";

            // Get Prices
            const pStud = parseFloat(document.getElementById('p-stud').value);
            const pTreat = parseFloat(document.getElementById('p-treated').value);
            const pDry = parseFloat(document.getElementById('p-drywall').value);
            const pLab = parseFloat(document.getElementById('p-labor').value);
            const pMark = parseFloat(document.getElementById('p-markup').value) / 100;

            // 1. MATH CALCULATIONS
            const L = state.length;
            const H = state.height;
            const waste = 1.10;
            
            // Studs
            const baseStuds = Math.floor((L * 12) / state.spacing) + 1;
            const extraStuds = 2 + (state.openings * 2); 
            const totalStuds = Math.ceil((baseStuds + extraStuds) * waste);
            
            // Plates (16ft stock)
            const solePlateCount = Math.ceil(L / 16);
            const topPlateCount = Math.ceil((L * 2) / 16);
            
            // Drywall (32 sq ft per sheet)
            const sqFt = Math.max(0, (L * H) - (state.openings * 21));
            const drywallSheets = Math.ceil((sqFt * waste) / 32);

            // Labor (0.25 hrs/ft frame + 0.4 hrs/sheet drywall)
            const hrs = (L * 0.25) + (state.openings * 1.5) + (drywallSheets * 0.40);

            // 2. GENERATE INVOICE
            let subtotal = 0;
            const receipt = document.getElementById('invoice-items');
            receipt.innerHTML = '';

            const addItem = (name, qty, unit, price) => {
                if (qty <= 0) return;
                const total = qty * price;
                subtotal += total;
                receipt.innerHTML += `
                    <div class="flex justify-between items-center text-sm group">
                        <div class="flex-1">
                            <p class="font-semibold text-slate-200 group-hover:text-white transition-colors">${name}</p>
                            <p class="text-[10px] text-slate-500">${qty} ${unit} @ $${price.toFixed(2)}</p>
                        </div>
                        <div class="font-bold text-slate-300 group-hover:text-amber-400 transition-colors">
                            $${total.toFixed(2)}
                        </div>
                    </div>
                `;
            };

            addItem(`2x4x${H}ft Studs`, totalStuds, "ea", pStud);
            if (state.treated) {
                addItem(`2x4x16ft Treated Plate`, solePlateCount, "ea", pTreat);
                addItem(`2x4x16ft Top Plate`, topPlateCount, "ea", pStud);
            } else {
                addItem(`2x4x16ft Plates`, solePlateCount + topPlateCount, "ea", pStud);
            }
            addItem(`1/2" 4x8 Drywall`, drywallSheets, "ea", pDry);
            addItem(`Labor Allocation`, parseFloat(hrs.toFixed(1)), "hrs", pLab);

            // Totals
            const markupVal = subtotal * pMark;
            const final = subtotal + markupVal;
            document.getElementById('sum-grandtotal').innerText = `$${final.toFixed(2)}`;

            // 3. REBUILD 3D MODEL
            rebuildWall3D(L, H, state.openings, state.treated, state.drywall);
            
            // Move camera smoothly to center the new wall
            controls.target.set(L/2, H/2, 0);
        }

        // ==========================================
        // 4. PHYSICAL 3D CONSTRUCTOR
        // ==========================================
        function rebuildWall3D(L, H, openings, PT, hasDrywall) {
            while (wallGroup.children.length > 0) wallGroup.remove(wallGroup.children[0]);

            const thick = 1.5/12, depth = 3.5/12;
            const makeMesh = (w, h, d, x, y, mat) => {
                const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
                mesh.position.set(x, y, 0);
                mesh.castShadow = true; mesh.receiveShadow = true;
                wallGroup.add(mesh);
            };

            // Bottom Plate
            if (openings === 1) {
                makeMesh(L/2 - 1.5, thick, depth, (L/2 - 1.5)/2, thick/2, PT ? woodMaterials.treated : woodMaterials.stud);
                makeMesh(L/2 - 1.5, thick, depth, L - (L/2 - 1.5)/2, thick/2, PT ? woodMaterials.treated : woodMaterials.stud);
            } else {
                makeMesh(L, thick, depth, L/2, thick/2, PT ? woodMaterials.treated : woodMaterials.stud);
            }

            // Top Plates
            makeMesh(L, thick, depth, L/2, H - thick*1.5, woodMaterials.stud);
            makeMesh(L, thick, depth, L/2, H - thick/2, woodMaterials.stud);

            // Studs
            const sH = H - (thick*3);
            const opPos = openings === 1 ? [L/2] : [];
            
            for (let x=0; x<=L; x+=(state.spacing/12)) {
                if (x>L-0.1) x=L;
                let inOp = opPos.some(op => x >= op - 1.5 && x <= op + 1.5);
                if (!inOp) makeMesh(thick, sH, depth, x, thick + sH/2, woodMaterials.stud);
            }

            // Door Structurals
            opPos.forEach(op => {
                makeMesh(thick, sH, depth, op - 1.5 - thick/2, thick + sH/2, woodMaterials.stud); // King
                makeMesh(thick, sH, depth, op + 1.5 + thick/2, thick + sH/2, woodMaterials.stud); // King
                makeMesh(thick, 6.8, depth, op - 1.5 + thick/2, thick + 6.8/2, woodMaterials.stud); // Jack
                makeMesh(thick, 6.8, depth, op + 1.5 - thick/2, thick + 6.8/2, woodMaterials.stud); // Jack
                makeMesh(3-thick*2, 6/12, depth, op, 6.8 + thick + 3/12, woodMaterials.stud); // Header
            });

            // Drywall Overlay
            if (hasDrywall) {
                const dryMesh = new THREE.Mesh(new THREE.BoxGeometry(L, H, 0.5/12), woodMaterials.drywall);
                dryMesh.position.set(L/2, H/2, depth/2 + 0.25/12);
                wallGroup.add(dryMesh);
            }
        }

        function approveEstimate() {
            const btn = document.querySelector('button[onclick="approveEstimate()"]');
            btn.innerHTML = `<i data-lucide="check" class="w-5 h-5"></i> SAVED TO WORKSPACE`;
            btn.className = "w-full bg-emerald-500 text-slate-950 font-black py-3.5 rounded-xl shadow-[0_0_20px_rgba(16,185,129,0.4)] flex justify-center items-center gap-2";
            setTimeout(() => {
                btn.innerHTML = `<i data-lucide="check-circle" class="w-5 h-5"></i> LOCK IN ESTIMATE`;
                btn.className = "w-full bg-white text-slate-950 font-bold py-3.5 rounded-xl shadow-[0_0_20px_rgba(255,255,255,0.2)] hover:scale-[1.02] transition-transform flex justify-center items-center gap-2";
            }, 3000);
        }
    </script>
</body>
</html>
